<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игры Великих Любовников — Курс-тренинг</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #FAF6F0; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track {
      height: 6px; border-radius: 3px;
      background: linear-gradient(90deg, #EDE0D4, #EDE0D4);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      border-radius: 50%; background: currentColor;
      margin-top: -7px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    input[type=range]::-moz-range-track {
      height: 6px; border-radius: 3px; background: #EDE0D4;
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: currentColor; border: none; cursor: pointer;
    }
    textarea { box-sizing: border-box; }
    button { font-family: 'DM Sans', sans-serif; }
    * { text-wrap: pretty; }
    @media (max-width: 768px) {
      body { padding-top: 56px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ModulesStub.jsx"></script>
  <script type="text/babel" src="Module1.jsx"></script>
  <script type="text/babel" src="Module2.jsx"></script>
  <script type="text/babel" src="Module3.jsx"></script>
  <script type="text/babel" src="Module4.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>


</body>
</html>
