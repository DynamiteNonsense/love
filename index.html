async function aiComplete(prompt){
  try{
    const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${OR_KEY}`,'Content-Type':'application/json','HTTP-Referer':window.location.href},
      body:JSON.stringify({model:'x-ai/grok-4.1-fast',messages:[{role:'user',content:prompt}],max_tokens:600})
    });
    const d=await r.json();
    return d.choices[0].message.content.trim();
  }catch(e){return 'Не удалось получить ответ. Проверьте подключение к интернету.';}
}

function GameCardWidget({ onDone }) {
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem('ggl_m1_games') || 'null'); } catch { return null; }
  })();
  const [cards, setCards] = useState(saved || [
    { id: 1, name: '', rules: '', triggers: '', payoff: '' }
  ]);
  const [activeCard, setActiveCard] = useState(1);

  useEffect(() => {
    localStorage.setItem('ggl_m1_games', JSON.stringify(cards));
  }, [cards]);

  const update = (id, field, value) => {
    setCards(cs => cs.map(c => c.id === id ? { ...c, [field]: value } : c));
  };

  const addCard = () => {
    if (cards.length >= 4) return;
    const newId = Date.now();
    setCards(cs => [...cs, { id: newId, name: '', rules: '', triggers: '', payoff: '' }]);
    setActiveCard(newId);
  };

  const removeCard = (id) => {
    if (cards.length <= 1) return;
    setCards(cs => cs.filter(c => c.id !== id));
  };

  const filledCount = cards.filter(c => c.name && c.rules).length;

  return (
    <div>
      <p style={{...m1Styles.body, marginBottom: 20}}>
        Вспомните 1–3 паттерна поведения в отношениях, которые повторяются снова и снова. Это и есть ваши текущие «игры». Заполните карточки:
      </p>
      <div style={m1Styles.cardGrid}>
        {cards.map((card, idx) => (
          <div
            key={card.id}
            style={{
              ...m1Styles.gameCard,
              ...(activeCard === card.id ? m1Styles.gameCardActive : {}),
            }}
            onClick={() => setActiveCard(card.id)}
          >
            {cards.length > 1 && (
              <button style={m1Styles.deleteBtn} onClick={e => { e.stopPropagation(); removeCard(card.id); }}>✕</button>
            )}
            <div style={m1Styles.cardCorner}>♥</div>
            <div style={{marginBottom: 16, marginTop: 4}}>
              <div style={m1Styles.fieldLabel}>Название игры</div>
              <input
                style={{
                  ...m1Styles.fieldInput,
                  borderBottomColor: activeCard === card.id ? '#C05A3A' : '#EDE0D4',
                  fontFamily: "'Playfair Display', serif",
                  fontSize: 16,
                  fontWeight: 600,
                }}
                placeholder="Игра «...»"
                value={card.name}
                onChange={e => update(card.id, 'name', e.target.value)}
              />
            </div>
            <div>
              <div style={m1Styles.fieldLabel}>Правила</div>
              <textarea
                style={{
                  ...m1Styles.fieldTextarea,
                  borderColor: activeCard === card.id ? '#C05A3A' : '#EDE0D4',
                  height: 64,
                }}
                placeholder="Что я делаю, когда «играю»..."
                value={card.rules}
                onChange={e => update(card.id, 'rules', e.target.value)}
              />
            </div>
            <div>
              <div style={m1Styles.fieldLabel}>Триггеры</div>
              <textarea
                style={{
                  ...m1Styles.fieldTextarea,
                  borderColor: activeCard === card.id ? '#C05A3A' : '#EDE0D4',
                  height: 56,
                }}
                placeholder="Что запускает эту игру..."
                value={card.triggers}
                onChange={e => update(card.id, 'triggers', e.target.value)}
              />
            </div>
            <div>
              <div style={m1Styles.fieldLabel}>Выигрыш / скрытая выгода</div>
              <textarea
                style={{
                  ...m1Styles.fieldTextarea,
                  borderColor: activeCard === card.id ? '#C05A3A' : '#EDE0D4',
                  height: 56,
                }}
                placeholder="Что я «получаю» от этой игры..."
                value={card.payoff}
                onChange={e => update(card.id, 'payoff', e.target.value)}
              />
            </div>
          </div>
        ))}
      </div>

      {cards.length < 4 && (
        <button style={m1Styles.addBtn} onClick={addCard}>
          <span style={{fontSize: 18, lineHeight: 1}}>+</span> Добавить ещё игру
        </button>
      )}

      {filledCount > 0 && (
        <div style={{
          marginTop: 24,
          background: 'linear-gradient(135deg, #FFF8F0, #FAF0E8)',
          border: '1px solid #EDD8C4',
          borderRadius: 12,
          padding: '18px 20px',
        }}>
          <div style={{fontFamily: "'Playfair Display', serif", fontSize: 15, color: '#C05A3A', marginBottom: 8, fontWeight: 700}}>
            💡 Ключевой вопрос для каждой игры
          </div>
          <p style={{fontSize: 14, color: '#5A4438', lineHeight: 1.7, margin: 0}}>
            Посмотрите на «выигрыш». Какой <strong>фрейм</strong> (убеждение о себе или партнёре) стоит за этой игрой? 
            Именно там — корень. Меняя фрейм, мы меняем игру.
          </p>
        </div>
      )}
    </div>
  );
}

];

function BankAccount() {
  const loadData = () => {
    try { return JSON.parse(localStorage.getItem('ggl_m3_bank') || 'null'); } catch { return null; }
  };

  const [transactions, setTransactions] = useState(loadData()?.transactions || []);
  const [input, setInput] = useState('');
  const [type, setType] = useState('deposit');
  const [amount, setAmount] = useState(10);
  const [animBal, setAnimBal] = useState(null);
  const animRef = useRef(null);

  const balance = transactions.reduce((s, t) => s + t.value, 0);
  const clampedBal = Math.max(-100, Math.min(100, balance));

  useEffect(() => {
    localStorage.setItem('ggl_m3_bank', JSON.stringify({ transactions }));
  }, [transactions]);

  // Animate balance on change
  useEffect(() => {
    if (animRef.current) clearTimeout(animRef.current);
    setAnimBal(true);
    animRef.current = setTimeout(() => setAnimBal(false), 600);
  }, [balance]);

  const addTransaction = () => {
    if (!input.trim()) return;
    const val = type === 'deposit' ? amount : -amount;
    const tx = { id: Date.now(), text: input.trim(), value: val, type, date: new Date().toLocaleDateString('ru') };
    setTransactions(ts => [tx, ...ts.slice(0, 19)]);
    setInput('');
    setAmount(10);
  };

  const removeTransaction = (id) => setTransactions(ts => ts.filter(t => t.id !== id));

    if (b > -50) return '#D06040';
    return '#B03020';

      {/* Balance Gauge */}

              fontWeight: 700,
              color: balColor,
              lineHeight: 1,
              transition: 'color 0.5s',
              ...(animBal ? { transform: 'scale(1.05)', transition: 'transform 0.15s, color 0.5s' } : {}),
            }}>
              {balance > 0 ? '+' : ''}{balance}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 13, color: balColor, fontWeight: 600, transition: 'color 0.5s' }}>{getBalanceLabel(clampedBal)}</div>
            <div style={{ fontSize: 11, color: '#4A7A60', marginTop: 4 }}>{transactions.length} операций</div>
          </div>
        </div>

        {/* Bar */}
        <div style={{ position: 'relative', height: 12, background: 'rgba(255,255,255,0.08)', borderRadius: 6, overflow: 'hidden' }}>

          <div style={{
            position: 'absolute',
            top: 0, bottom: 0,
            left: balance >= 0 ? '50%' : `${pct}%`,
            width: `${Math.abs(clampedBal) / 2}%`,
            background: `linear-gradient(90deg, ${balColor}90, ${balColor})`,
            borderRadius: 6,
            transition: 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)',
          }}></div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontSize: 10, color: '#4A6A58' }}>
          <span>-100</span><span>0</span><span>+100</span>
        </div>
      </div>

      {/* Input */}
      <div style={{ background: '#F9F6F2', borderRadius: 14, padding: '20px 22px', marginBottom: 20 }}>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          {['deposit', 'withdrawal'].map(t => (
            <button key={t} onClick={() => setType(t)} style={{
              flex: 1, padding: '10px', borderRadius: 10,
              border: `2px solid ${type === t ? (t === 'deposit' ? '#2D7A50' : '#C05A3A') : '#EDE0D4'}`,
              background: type === t ? (t === 'deposit' ? '#EFF8F3' : '#FFF0EC') : 'transparent',
              color: type === t ? (t === 'deposit' ? '#2D7A50' : '#C05A3A') : '#A08878',
              fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
              transition: 'all 0.2s',
            }}>
              {t === 'deposit' ? '↑ Вклад' : '↓ Снятие'}
            </button>
          ))}
        </div>

        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addTransaction()}
          placeholder={type === 'deposit' ? 'Что вы сделали для партнёра...' : 'Что уменьшило доверие...'}
          style={{
            width: '100%', border: `1.5px solid ${type === 'deposit' ? '#A0C8A8' : '#E0A898'}`,

          <input type="range" min="1" max="30" value={amount}
            onChange={e => setAmount(parseInt(e.target.value))}

          />
        </div>

        {/* Quick chips */}
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14 }}>
          {(type === 'deposit' ? DEPOSIT_SUGGESTIONS : WITHDRAWAL_SUGGESTIONS).slice(0, 5).map(s => (
            <button key={s} onClick={() => setInput(s)} style={{
              padding: '4px 10px', borderRadius: 20,
              border: '1px solid #EDE0D4', background: 'transparent',
              color: '#7A5C4A', fontSize: 12, cursor: 'pointer',
              fontFamily: "'DM Sans', sans-serif", transition: 'all 0.15s',
            }}>{s}</button>
          ))}
        </div>

        <button onClick={addTransaction} disabled={!input.trim()} style={{
          width: '100%', padding: '12px', borderRadius: 10, border: 'none',
          background: input.trim() ? (type === 'deposit' ? '#2D7A50' : '#C05A3A') : '#D0C8C0',
          color: '#fff', fontSize: 14, fontWeight: 600,
          cursor: input.trim() ? 'pointer' : 'default',
          fontFamily: "'DM Sans', sans-serif", transition: 'all 0.2s',
        }}>
          {type === 'deposit' ? '+ Записать вклад' : '– Записать снятие'}
        </button>
      </div>

      {/* Transactions */}
      {transactions.length > 0 && (
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#A08878', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>
            История операций
          </div>
          <div style={{ maxHeight: 280, overflowY: 'auto', paddingRight: 4 }}>
            {transactions.map(tx => (
              <div key={tx.id} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '10px 14px', marginBottom: 6, borderRadius: 10,

                <span style={{ fontSize: 16, flexShrink: 0 }}>{tx.type === 'deposit' ? '↑' : '↓'}</span>
                <span style={{ flex: 1, fontSize: 14, color: '#3C2818' }}>{tx.text}</span>
                <span style={{
                  fontWeight: 700, fontSize: 14,
                  color: tx.type === 'deposit' ? '#2D7A50' : '#C05A3A',
                  flexShrink: 0,
                }}>
                  {tx.value > 0 ? '+' : ''}{tx.value}
                </span>
                <button onClick={() => removeTransaction(tx.id)} style={{
                  background: 'none', border: 'none', color: '#C0B0A0',
                  cursor: 'pointer', fontSize: 13, padding: 2, flexShrink: 0,
                }}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {transactions.length === 0 && (
        <div style={{ textAlign: 'center', padding: '32px', color: '#A08878', fontSize: 14 }}>
          Начните вести счёт своих взаимодействий с партнёром ↑
        </div>
      )}
    </div>
  );
}

function DisclosurePyramid() {
  const loadTopics = () => {
    try { return JSON.parse(localStorage.getItem('ggl_m4_topics') || '{}'); } catch { return {}; }
  };
  const [topics, setTopics] = useState(loadTopics());
  const [openLevel, setOpenLevel] = useState(null);
  const [newTopic, setNewTopic] = useState('');
  const [comfort, setComfort] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ggl_m4_comfort') || '{}'); } catch { return {}; }
  });

  useEffect(() => { localStorage.setItem('ggl_m4_topics', JSON.stringify(topics)); }, [topics]);
  useEffect(() => { localStorage.setItem('ggl_m4_comfort', JSON.stringify(comfort)); }, [comfort]);

  const addTopic = (levelId) => {
    if (!newTopic.trim()) return;
    setTopics(t => ({
      ...t,
      [levelId]: [...(t[levelId] || []), newTopic.trim()],
    }));
    setNewTopic('');
  };

  const removeTopic = (levelId, idx) => {
    setTopics(t => ({ ...t, [levelId]: t[levelId].filter((_, i) => i !== idx) }));
  };

  const toggleComfort = (levelId) => {
    setComfort(c => ({ ...c, [levelId]: !c[levelId] }));
  };

  const totalTopics = Object.values(topics).flat().length;

  return (
    <div>
      <p style={m4s.body}>Близость строится постепенно — от поверхностного к глубокому. Добавьте темы, которые уже открыты в ваших отношениях, и те, которые хотите исследовать. Отметьте уровни, на которых вам комфортно находиться.</p>

      {totalTopics > 0 && (
        <div style={{ background: '#F0EBF8', borderRadius: 10, padding: '12px 16px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 20 }}>💜</span>
          <span style={{ fontSize: 14, color: '#5B3A7E' }}>
            Вы добавили <strong>{totalTopics}</strong> тем. {totalTopics >= 5 ? 'Отличная работа — вы строите глубокую карту близости!' : 'Продолжайте добавлять темы для каждого уровня.'}
          </span>
        </div>
      )}

      {/* Pyramid visualization */}
      <div style={{ marginBottom: 8 }}>
        {PYRAMID_LEVELS.map((level, idx) => {
          const isOpen = openLevel === level.id;
          const levelTopics = topics[level.id] || [];
          const isComfy = comfort[level.id];
          const widthPct = 40 + (5 - idx) * 12;

          return (
            <div key={level.id} style={{ marginBottom: 6 }}>
              {/* Triangle row */}
              <div
                onClick={() => setOpenLevel(isOpen ? null : level.id)}
                style={{
                  margin: '0 auto',
                  width: `${widthPct}%`,
                  minWidth: 240,
                  background: isOpen ? level.color : level.lightColor,
                  border: `2px solid ${level.color}`,
                  borderRadius: isOpen ? '12px 12px 0 0' : 12,
                  padding: '12px 20px',
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-between',
                  transition: 'all 0.25s',
                  userSelect: 'none',
                }}
              >
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 16 }}>{level.icon}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: isOpen ? '#fff' : level.color }}>{level.label}</div>
                    {levelTopics.length > 0 && (
                      <div style={{ fontSize: 11, color: isOpen ? 'rgba(255,255,255,0.7)' : level.color, marginTop: 2 }}>
                        {levelTopics.length} {levelTopics.length === 1 ? 'тема' : 'тем'}
                      </div>
                    )}
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  {isComfy && <span style={{ fontSize: 13, color: isOpen ? 'rgba(255,255,255,0.8)' : level.color }}>✓ Комфортно</span>}
                  <span style={{ color: isOpen ? '#fff' : level.color, fontSize: 14 }}>{isOpen ? '▲' : '▼'}</span>
                </div>
              </div>

              {/* Expanded panel */}
              {isOpen && (
                <div style={{
                  margin: '0 auto',
                  width: `${widthPct}%`,
                  minWidth: 240,
                  background: '#FFFDF9',
                  border: `2px solid ${level.color}`,
                  borderTop: 'none',
                  borderRadius: '0 0 12px 12px',

                }}>

                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>

                          border: `1px solid ${level.color}60`,
                          background: `${level.color}12`,
                          color: level.color, fontSize: 12, cursor: 'pointer',
                          fontFamily: "'DM Sans', sans-serif",
                        }}>{ex}</button>
                    ))}
                  </div>

                  {levelTopics.length > 0 && (
                    <div style={{ marginBottom: 12 }}>
                      {levelTopics.map((t, i) => (
                        <div key={i} style={{

                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                    <input
                      value={newTopic}
                      onChange={e => setNewTopic(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && addTopic(level.id)}
                      placeholder="Добавить тему..."
                      style={{
                        flex: 1, border: `1.5px solid ${level.color}60`,
                        borderRadius: 8, padding: '8px 12px', fontSize: 13,
                        color: '#2C1810', fontFamily: "'DM Sans', sans-serif", outline: 'none', background: '#fff',
                      }}
                    />
                    <button onClick={() => addTopic(level.id)} style={{
                      padding: '8px 16px', borderRadius: 8, border: 'none',
                      background: level.color, color: '#fff', fontSize: 13,
                      fontWeight: 600, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
                    }}>+</button>
                  </div>

                  <button onClick={() => toggleComfort(level.id)} style={{
                    padding: '8px 14px', borderRadius: 8,
                    border: `1.5px solid ${level.color}`,
                    background: isComfy ? level.color : 'transparent',
                    color: isComfy ? '#fff' : level.color,
                    fontSize: 13, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif", fontWeight: 600,
                  }}>
                    {isComfy ? '✓ Этот уровень мне комфортен' : 'Отметить как комфортный'}
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function QuestionGenerator() {
  const [category, setCategory] = useState('all');
  const [current, setCurrent] = useState(null);
  const [used, setUsed] = useState([]);
  const [loading, setLoading] = useState(false);
  const [aiQuestion, setAiQuestion] = useState('');

  const categories = ['all', ...new Set(DEEP_QUESTIONS.map(q => q.category))];

  const getNext = () => {
    const pool = DEEP_QUESTIONS.filter(q => (category === 'all' || q.category === category) && !used.includes(q.q));
    if (pool.length === 0) { setUsed([]); return; }
    const picked = pool[Math.floor(Math.random() * pool.length)];
    setCurrent(picked);
    setUsed(u => [...u, picked.q]);
    setAiQuestion('');
  };

  const getAiQuestion = async () => {
    setLoading(true);
    setAiQuestion('');
    try {
      const result = await aiComplete(`Придумай один глубокий вопрос для партнёров, который поможет углубить близость и самораскрытие. Уровень глубины: ${category === 'all' ? 'любой' : category}. Только сам вопрос, без пояснений. На русском языке.`
        );
      setAiQuestion(result.trim());
    } catch (e) {
      setAiQuestion('Расскажи мне о моменте, когда ты чувствовал(а) себя полностью принятым(ой).');
    }
    setLoading(false);
  };

  const levelColor = current ? PYRAMID_LEVELS.find(l => l.id === current.level)?.color || '#5B3A7E' : '#5B3A7E';

  return (
    <div>
      <p style={m4s.body}>Эти вопросы помогут вам и партнёру перейти от поверхностного к глубокому. Выберите категорию и начните разговор:</p>

      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
        {categories.map(cat => (
          <button key={cat} onClick={() => setCategory(cat)} style={{
            padding: '7px 14px', borderRadius: 8,
            border: `1.5px solid ${category === cat ? '#5B3A7E' : '#EDE0D4'}`,
            background: category === cat ? '#F5EFF8' : 'transparent',
            color: category === cat ? '#5B3A7E' : '#7A5C4A',
            fontSize: 12, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
            fontWeight: category === cat ? 600 : 400, transition: 'all 0.2s',
          }}>{cat === 'all' ? 'Все темы' : cat}</button>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
        <button onClick={getNext} style={{
          flex: 1, padding: '13px', borderRadius: 10, border: 'none',
          background: '#5B3A7E', color: '#fff', fontSize: 14, fontWeight: 600,
          cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
        }}>
          🎲 Случайный вопрос
        </button>
        <button onClick={getAiQuestion} disabled={loading} style={{
          flex: 1, padding: '13px', borderRadius: 10,
          border: '2px solid #5B3A7E', background: 'transparent',
          color: loading ? '#A08878' : '#5B3A7E', fontSize: 14, fontWeight: 600,
          cursor: loading ? 'default' : 'pointer', fontFamily: "'DM Sans', sans-serif",
          transition: 'all 0.2s',
        }}>
          {loading ? '⏳ Создаю...' : '✨ Создать с AI'}
        </button>
      </div>

      {(current || aiQuestion) && (
        <div style={{
          background: current && !aiQuestion
            ? `linear-gradient(135deg, ${levelColor}18, ${levelColor}08)`
            : 'linear-gradient(135deg, #F5EFF8, #EBE4F4)',
          border: `2px solid ${current && !aiQuestion ? levelColor : '#7A50A0'}40`,
          borderRadius: 16, padding: '28px 30px',
          animation: 'fadeIn 0.4s ease',
        }}>
          {current && !aiQuestion && (
            <div style={{ fontSize: 11, fontWeight: 700, color: levelColor, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>
              {PYRAMID_LEVELS.find(l => l.id === current.level)?.label} · {current.category}
            </div>
          )}
          {aiQuestion && (
            <div style={{ fontSize: 11, fontWeight: 700, color: '#7A50A0', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>
              ✨ AI-вопрос
            </div>
          )}
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: '#2C1810', lineHeight: 1.4, fontStyle: 'italic' }}>
            «{aiQuestion || current?.q}»
          </div>
          <div style={{ marginTop: 16, fontSize: 13, color: '#7A5C4A', lineHeight: 1.65 }}>
            <em>Совет: не торопитесь с ответом. Дайте себе и партнёру время почувствовать, что возникает.</em>
          </div>
        </div>
      )}

      {!current && !aiQuestion && (
        <div style={{ textAlign: 'center', padding: '32px', color: '#A08878', fontSize: 14 }}>
          Нажмите кнопку выше, чтобы получить вопрос для глубокого разговора
        </div>
      )}

      <style>{`@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }`}</style>
    </div>
  );
}

<script type="text/babel">
const META_PROGS=[
  {id:'gd',left:'Глобальный',right:'Детальный',ldesc:'Видит общую картину',rdesc:'Важны детали'},
  {id:'sd',left:'Сходство',right:'Различие',ldesc:'Ищет общее',rdesc:'Замечает отличия'},
  {id:'ap',left:'Приближение',right:'Избегание',ldesc:'К чему стремится',rdesc:'Чего избегает'},
  {id:'ir',left:'Внешняя реф.',right:'Внутренняя реф.',ldesc:'Спрашивает других',rdesc:'Доверяет себе'},
  {id:'op',left:'Опции',right:'Процедуры',ldesc:'Любит варианты',rdesc:'Следует правилам'},
  {id:'tp',left:'Прошлое',right:'Будущее',ldesc:'Опирается на опыт',rdesc:'Ориентирован на цели'},
  {id:'pc',left:'Проактивный',right:'Рефлексивный',ldesc:'Действует быстро',rdesc:'Сначала думает'},
  {id:'si',left:'Само-',right:'Другие-',ldesc:'Фокус на себе',rdesc:'Фокус на партнёре'},
];

function RadarChart({self,partner}){
  const n=META_PROGS.length;
  const cx=120,cy=120,r=80;
  const angle=(i)=>((i/n)*2*Math.PI)-Math.PI/2;
  const pt=(i,v)=>{
    const a=angle(i);
    const d=(v/100)*r;
    return [cx+d*Math.cos(a),cy+d*Math.sin(a)];
  };
  const poly=(vals,color)=>{
    const points=vals.map((v,i)=>{const[x,y]=pt(i,v);return `${x},${y}`;}).join(' ');
    return <polygon points={points} fill={color+'30'} stroke={color} strokeWidth={2}/>;
  };
  const grids=[25,50,75,100];
  return(
    <svg width={240} height={240} style={{display:'block',margin:'0 auto'}}>
      {grids.map(g=>(
        <polygon key={g} points={META_PROGS.map((_,i)=>{const[x,y]=pt(i,g);return `${x},${y}`;}).join(' ')}
          fill="none" stroke="#EDE0D4" strokeWidth={1}/>
      ))}
      {META_PROGS.map((_,i)=>{const[x,y]=pt(i,100);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#EDE0D4" strokeWidth={1}/>;  })}
      {poly(META_PROGS.map(p=>self[p.id]||50),'#1A5C50')}
      {Object.keys(partner).length>0&&poly(META_PROGS.map(p=>partner[p.id]||50),'#C05A3A')}

  {key:'game',title:'Какая игра играется?',q:'Как называется этот паттерн? Это «игра» с именем:',ph:'Например: «Игра в правоту», «Игра в жертву»...'},
  {key:'players',title:'Роли игроков',q:'Какие роли принимают участники? (Нападающий/Защищающийся, Родитель/Ребёнок...)',ph:'Я в этой игре...'},
  {key:'hooks',title:'Крючки',q:'За что именно «цепляет» эта ситуация? Что задевает глубоко?',ph:'Меня цепляет, потому что...'},
  {key:'frame',title:'Фрейм за конфликтом',q:'Какое убеждение о себе/партнёре/отношениях стоит за этой болью?',ph:'Этот конфликт говорит мне, что...'},
  {key:'newframe',title:'Новый фрейм',q:'Какой ресурсный фрейм мог бы занять это место?',ph:'Альтернативное убеждение...'},
];

function Module10({onComplete}){
  const {useState,useEffect}=React;
  const load=()=>{try{return JSON.parse(localStorage.getItem('ggl_m10')||'null');}catch{return null;}};
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState(load()?.answers||{});
  const [done,setDone]=useState(false);
  const [aiSuggest,setAiSuggest]=useState('');
  const [aiLoad,setAiLoad]=useState(false);

  useEffect(()=>{localStorage.setItem('ggl_m10',JSON.stringify({answers}));},[answers]);

  const cur=CONFLICT_STEPS[step];
  const setAns=v=>setAnswers(a=>({...a,[cur.key]:v}));
  const next=()=>{if(step<CONFLICT_STEPS.length-1)setStep(s=>s+1);else setDone(true);};
  const prev=()=>setStep(s=>s-1);

  const getAiNewFrame=async()=>{
    setAiLoad(true);
    const r=await aiComplete(`Коуч по НЛП. Помогите найти ресурсный фрейм для конфликтной ситуации.\nСитуация: ${answers.situation}\nСтарый фрейм: ${answers.frame}\nПредложите 1-2 ресурсных альтернативных убеждения. Кратко, тепло.`);
    setAiSuggest(r);setAiLoad(false);
    setAnswers(a=>({...a,newframe:r}));
  };

  return(
    <Wrap>
      <Hero num={10} suit="♦" bg="linear-gradient(135deg,#1A0C08,#3A1808)" color="#D07030"
        title="Здоровый Конфликт" sub="Конфликт неизбежен. Вопрос не «как избежать», а «как драться честно, чтобы оба выиграли»."/>

      <Card>
        <CardTitle>Правила честного боя</CardTitle>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10,marginBottom:8}}>
          {[['⚔️ Атакуй проблему','Не партнёра как человека'],['🎯 Один вопрос за раз','Не «вспоминай все грехи»'],['⏸️ Тайм-аут','Если температура зашкалила — пауза'],['👂 Слушай до конца','Прежде чем отвечать'],['🤝 Ищи win-win','Не победу, а решение']].map(([t,d])=>(
            <div key={t} style={{background:'#FFF8F4',borderRadius:10,padding:'12px 14px',border:'1px solid #F0D0C0'}}>
              <div style={{fontSize:13,fontWeight:600,color:'#A04010',marginBottom:4}}>{t}</div>
              <div style={{fontSize:12,color:'#5A4438'}}>{d}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <CardTitle>Трекер конфликта: фреймовый анализ</CardTitle>
        {!done?(
          <>
            <div style={{display:'flex',gap:4,marginBottom:20}}>
              {CONFLICT_STEPS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<step?'#A04010':i===step?'#D07030':'#EDE0D4',transition:'background .3s'}}/>)}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:'#D07030',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>
              Шаг {step+1}: {cur.title}
            </div>
            <div style={{fontSize:14,color:'#5A4438',lineHeight:1.65,marginBottom:14}}>{cur.q}</div>
            <textarea value={answers[cur.key]||''} onChange={e=>setAns(e.target.value)}
              placeholder={cur.ph} rows={3}
              style={{width:'100%',border:'1.5px solid #E0C0A0',borderRadius:12,padding:'12px 14px',fontSize:14,color:'#2C1810',outline:'none',resize:'none',marginBottom:12}}/>
            {step===5&&(
              <button onClick={getAiNewFrame} disabled={aiLoad||!answers.frame} style={{width:'100%',padding:11,borderRadius:10,border:'none',background:aiLoad||!answers.frame?'#D0C0B0':'#A04010',color:'#fff',fontSize:13,fontWeight:600,cursor:aiLoad||!answers.frame?'default':'pointer',marginBottom:12}}>
                {aiLoad?'⏳ Генерирую...':'✨ AI: предложить ресурсный фрейм'}
              </button>
            )}
            <div style={{display:'flex',gap:10}}>
              {step>0&&<button onClick={prev} style={{flex:1,padding:12,borderRadius:10,border:'1.5px solid #EDE0D4',background:'transparent',color:'#7A5C4A',fontSize:14,cursor:'pointer'}}>← Назад</button>}
              <button onClick={next} disabled={!answers[cur.key]?.trim()} style={{flex:2,padding:12,borderRadius:10,border:'none',background:answers[cur.key]?.trim()?'#A04010':'#D0C0B0',color:'#fff',fontSize:14,fontWeight:600,cursor:answers[cur.key]?.trim()?'pointer':'default'}}>
                {step<CONFLICT_STEPS.length-1?'Далее →':'Завершить анализ →'}
              </button>
            </div>
          </>
        ):(
          <div className="fade-up">
            <div style={{background:'linear-gradient(135deg,#FFF8F4,#FEEDE0)',border:'2px solid #D07030',borderRadius:16,padding:'24px 28px',marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#2C1810',fontWeight:700,marginBottom:16}}>Анализ конфликта завершён</div>
              {CONFLICT_STEPS.map(s=>(
                <div key={s.key} style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#A04010',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>{s.title}</div>
                  <div style={{fontSize:13,color:'#3C2818',lineHeight:1.6,padding:'8px 12px',background:'rgba(255,255,255,.6)',borderRadius:8}}>{answers[s.key]||'—'}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>{setDone(false);setStep(0);setAnswers({});}} style={{flex:1,padding:11,borderRadius:10,border:'1.5px solid #A04010',background:'transparent',color:'#A04010',fontSize:13,cursor:'pointer'}}>↺ Новый конфликт</button>
              <button onClick={()=>{setDone(false);setStep(0);}} style={{flex:1,padding:11,borderRadius:10,border:'none',background:'#A04010',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>✏️ Редактировать</button>
            </div>
          </div>
        )}
      </Card>

      <Card>
        <CardTitle>Ключевые инсайты</CardTitle>
        <Insight icon="♦" text="Конфликт = различие + важность. Ни одно из них не плохо."/>
        <Insight icon="🔥" text="Мелкие обиды — это инвестиции в будущий взрыв. Обрабатывай их сразу."/>
        <Insight icon="🌊" text="«Эмоции — это просто эмоции»: они дают информацию, но не определяют истину."/>
      </Card>

      <NextBtn label="Модуль 11: Исцеление Любви →" color="linear-gradient(135deg,#A04010,#C06030)" shadow="rgba(160,64,16,.3)" onClick={()=>onComplete(10)}/>
    </Wrap>
  );
}
window.Module10=Module10;
</script>

<!-- ═══ MODULE 11 ═══════════════════════════════ -->
<script type="text/babel">
const THRESHOLD_LEVELS=[
  {v:0,label:'Открыт',desc:'Полная готовность к близости. Сердце открыто.',color:'#2D7A50'},
  {v:2,label:'Лёгкая усталость',desc:'Небольшое раздражение. Есть минорные разочарования.',color:'#5A9A60'},
  {v:4,label:'Накопление',desc:'Паттерн повторяется. Начинаете дистанцироваться.',color:'#C8842A'},
  {v:6,label:'Защитный режим',desc:'Эмоциональная дистанция. Меньше открытости, больше контроля.',color:'#D06040'},
  {v:8,label:'На грани',desc:'Серьёзное рассмотрение ухода. Большинство чувств заблокированы.',color:'#C03020'},
  {v:10,label:'Порог',desc:'Внутренний уход завершён. Внешнее — вопрос времени.',color:'#8A1010'},
];
const NEUTRAL_STEPS=[
  {title:'Признание',desc:'Скажите себе честно: «Я достиг(ла) уровня ___ на шкале порога».',action:'Запишите текущий уровень без осуждения'},
  {title:'Понять фрейм',desc:'Какое убеждение создало накопление? Что вы рассказывали себе об этих ситуациях?',action:'Найдите главный фрейм за болью'},
  {title:'Поискать намерение',desc:'Что ваша закрытость пытается защитить? Какая ценность стоит за болью?',action:'«Я закрываюсь, чтобы защитить...»'},
  {title:'Выбрать новый фрейм',desc:'Можно ли взглянуть на ситуацию иначе? Что изменится, если принять альтернативный фрейм?',action:'Сформулируйте новое убеждение'},
];

function Module11({onComplete}){
  const {useState,useEffect}=React;
  const [thLevel,setThLevel]=useState(()=>parseInt(localStorage.getItem('ggl_m11_level')||'3'));
  const [neutStep,setNeutStep]=useState(0);
  const [neutAnswers,setNeutAnswers]=useState(()=>{try{return JSON.parse(localStorage.getItem('ggl_m11_neut')||'{}');}catch{return {};}});
  const [done,setDone]=useState(false);
  const [forgText,setForgText]=useState(localStorage.getItem('ggl_m11_forg')||'');
  const [aiInsight,setAiInsight]=useState('');
  const [aiLoad,setAiLoad]=useState(false);

  useEffect(()=>{localStorage.setItem('ggl_m11_level',thLevel);},[thLevel]);
  useEffect(()=>{localStorage.setItem('ggl_m11_neut',JSON.stringify(neutAnswers));},[neutAnswers]);
  useEffect(()=>{localStorage.setItem('ggl_m11_forg',forgText);},[forgText]);

  const curLevel=THRESHOLD_LEVELS.reduce((p,c)=>Math.abs(c.v-thLevel)<Math.abs(p.v-thLevel)?c:p);
  const curNeut=NEUTRAL_STEPS[neutStep];

  const getAiForg=async()=>{
    setAiLoad(true);
    const r=await aiComplete(`Коуч по НЛП. Пользователь на уровне ${thLevel}/10 порога. Написал о прощении: "${forgText}". Дай краткий (2 предложения) поддерживающий инсайт о прощении как личном освобождении. Тёплый тон.`);
    setAiInsight(r);setAiLoad(false);
  };

  return(
    <Wrap>
      <Hero num={11} suit="♣" bg="linear-gradient(135deg,#081408,#102818)" color="#5A9A60"
        title="Исцеление<br/>Раненой Любви" sub="Порог — это момент, когда человек внутренне закрывается. Научитесь его узнавать и нейтрализовать."/>

      <Card>
        <CardTitle>Ваш текущий уровень порога</CardTitle>
        <Body>Где вы сейчас в своих отношениях?</Body>
        <input type="range" min={0} max={10} step={1} value={thLevel} onChange={e=>setThLevel(+e.target.value)}
          style={{width:'100%',marginBottom:16,color:curLevel.color}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#A08878',marginBottom:20}}>
          {THRESHOLD_LEVELS.map(l=><span key={l.v} style={{color:l.v===Math.round(thLevel/2)*2?curLevel.color:'#A08878',fontWeight:l.v===Math.round(thLevel/2)*2?700:400}}>{l.v}</span>)}
        </div>
        <div style={{background:`${curLevel.color}18`,border:`2px solid ${curLevel.color}40`,borderRadius:14,padding:'18px 22px',transition:'all .4s'}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:'#2C1810',fontWeight:700,marginBottom:6}}>{curLevel.label}</div>
          <div style={{fontSize:14,color:'#5A4438',lineHeight:1.65}}>{curLevel.desc}</div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginTop:16}}>
          {THRESHOLD_LEVELS.map(l=>(
            <div key={l.v} style={{padding:'10px 14px',borderRadius:10,background:`${l.color}12`,border:`1px solid ${l.color}30`,opacity:Math.abs(l.v-thLevel)>2?.5:1,transition:'opacity .3s'}}>
              <div style={{fontSize:12,fontWeight:700,color:l.color,marginBottom:3}}>{l.v} — {l.label}</div>
              <div style={{fontSize:11,color:'#5A4438',lineHeight:1.5}}>{l.desc}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <CardTitle>Нейтрализатор порога</CardTitle>
        {!done?(
          <>
            <div style={{display:'flex',gap:4,marginBottom:16}}>
              {NEUTRAL_STEPS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<neutStep?'#2A5A3A':i===neutStep?'#5A9A60':'#EDE0D4',transition:'background .3s'}}/>)}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:'#5A9A60',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Шаг {neutStep+1}: {curNeut.title}</div>
            <div style={{fontSize:14,color:'#5A4438',lineHeight:1.65,marginBottom:6}}>{curNeut.desc}</div>
            <div style={{fontSize:12,color:'#2A5A3A',background:'#F0F8F2',borderRadius:8,padding:'8px 12px',marginBottom:14}}>
              <strong>Задание:</strong> {curNeut.action}
            </div>
            <textarea value={neutAnswers[neutStep]||''} onChange={e=>setNeutAnswers(a=>({...a,[neutStep]:e.target.value}))}
              placeholder="Ваш ответ..." rows={3}
              style={{width:'100%',border:'1.5px solid #A0C8A8',borderRadius:12,padding:'10px 14px',fontSize:14,color:'#2C1810',outline:'none',resize:'none',marginBottom:12}}/>
            <div style={{display:'flex',gap:10}}>
              {neutStep>0&&<button onClick={()=>setNeutStep(s=>s-1)} style={{flex:1,padding:12,borderRadius:10,border:'1.5px solid #EDE0D4',background:'transparent',color:'#7A5C4A',fontSize:14,cursor:'pointer'}}>← Назад</button>}
              <button onClick={()=>{if(neutStep<NEUTRAL_STEPS.length-1)setNeutStep(s=>s+1);else setDone(true);}}
                disabled={!neutAnswers[neutStep]?.trim()} style={{flex:2,padding:12,borderRadius:10,border:'none',background:neutAnswers[neutStep]?.trim()?'#2A5A3A':'#C0D0C8',color:'#fff',fontSize:14,fontWeight:600,cursor:neutAnswers[neutStep]?.trim()?'pointer':'default'}}>
                {neutStep<NEUTRAL_STEPS.length-1?'Следующий шаг →':'Завершить процесс →'}
              </button>
            </div>
          </>
        ):(
          <div className="fade-up">
            <div style={{background:'#F0F8F2',borderRadius:14,padding:'20px 24px',marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:'#2C1810',fontWeight:700,marginBottom:12}}>✓ Процесс завершён</div>
              {NEUTRAL_STEPS.map((s,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#2A5A3A',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{s.title}</div>
                  <div style={{fontSize:13,color:'#3C2818',lineHeight:1.6,background:'rgba(255,255,255,.7)',borderRadius:8,padding:'8px 10px'}}>{neutAnswers[i]||'—'}</div>
                </div>
              ))}
            </div>
            <button onClick={()=>{setDone(false);setNeutStep(0);}} style={{padding:'8px 16px',borderRadius:8,border:'1.5px solid #2A5A3A',background:'transparent',color:'#2A5A3A',fontSize:13,cursor:'pointer'}}>↺ Пройти снова</button>
          </div>
        )}
      </Card>

      <Card>
        <CardTitle>Прощение как освобождение</CardTitle>
        <Body>Прощение — это не про другого. Это про освобождение себя от груза. Запишите, что вам нужно отпустить:</Body>
        <textarea value={forgText} onChange={e=>setForgText(e.target.value)}
          placeholder="Мне нужно отпустить..." rows={3}
          style={{width:'100%',border:'1.5px solid #A0C8A8',borderRadius:10,padding:'10px 12px',fontSize:14,color:'#2C1810',outline:'none',resize:'none',marginBottom:12}}/>
        {forgText.trim()&&(
          <button onClick={getAiForg} disabled={aiLoad} style={{padding:'10px 20px',borderRadius:10,border:'none',background:aiLoad?'#C0D0C8':'#2A5A3A',color:'#fff',fontSize:13,fontWeight:600,cursor:aiLoad?'default':'pointer',marginBottom:12}}>
            {aiLoad?'⏳...':'✨ Получить инсайт (AI)'}
          </button>
        )}
        {aiInsight&&<div style={{fontSize:14,color:'#2A4030',lineHeight:1.7,background:'#F0F8F2',borderRadius:10,padding:'14px 16px',fontStyle:'italic'}}>💚 {aiInsight}</div>}
      </Card>

      <Card>
        <CardTitle>Ключевые инсайты</CardTitle>
        <Insight icon="♣" text="Порог — это не слабость, это сигнал. Тело говорит: «Мне нужно что-то изменить»."/>
        <Insight icon="💚" text="Прощение — это процесс, не событие. Не нужно торопиться. Главное — намерение."/>
        <Insight icon="🌱" text="Нейтрализация порога: сначала признать, потом понять фрейм, потом выбрать новый."/>
      </Card>

      <NextBtn label="Модуль 12: Со-Творение →" color="linear-gradient(135deg,#2A5A3A,#3A7A50)" shadow="rgba(42,90,58,.3)" onClick={()=>onComplete(11)}/>
    </Wrap>
  );
}
window.Module11=Module11;
</script>

<!-- ═══ MODULE 12 ═══════════════════════════════ -->
<script type="text/babel">
const ALL_GAMES=[
  {id:'awareness',module:1,title:'Игра Осознанности',desc:'Замечаю свои паттерны и фреймы'},
  {id:'romance',module:2,title:'Игра Романтики',desc:'Целенаправленно создаю романтические моменты'},
  {id:'investment',module:3,title:'Игра Инвестиций',desc:'Каждый день делаю вклады в эмоциональный банк'},
  {id:'disclosure',module:4,title:'Игра Самораскрытия',desc:'Открываюсь на более глубоких уровнях'},
  {id:'language',module:5,title:'Игра Языков Любви',desc:'Говорю на языке любви партнёра'},
  {id:'presence',module:6,title:'Игра Присутствия',desc:'Практикую аттентивное слушание'},
  {id:'sync',module:7,title:'Игра Синхронизации',desc:'Принимаю различия в мета-программах'},
  {id:'design',module:8,title:'Игра Проектирования',desc:'Строю осознанное совместное будущее'},
  {id:'pleasure',module:9,title:'Игра Удовольствия',desc:'Усиливаю радость через осознание мета-уровня'},
  {id:'conflict',module:10,title:'Игра Честной Борьбы',desc:'Разрешаю конфликты по правилам честного боя'},
  {id:'healing',module:11,title:'Игра Исцеления',desc:'Нейтрализую пороги и практикую прощение'},
  {id:'cocreation',module:12,title:'Игра Со-Творения',desc:'Создаю взаимозависимость из силы, не из страха'},
];

function Module12({onComplete,completedModules}){
  const {useState,useEffect}=React;
  const load=()=>{try{return JSON.parse(localStorage.getItem('ggl_m12')||'null');}catch{return null;}};
  const [selected,setSelected]=useState(load()?.selected||[]);
  const [plan,setPlan]=useState(load()?.plan||'');
  const [aiLoad,setAiLoad]=useState(false);

  useEffect(()=>{localStorage.setItem('ggl_m12',JSON.stringify({selected,plan}));},[selected,plan]);

  const toggle=(id)=>{
    setSelected(s=>s.includes(id)?s.filter(i=>i!==id):s.length<5?[...s,id]:s);
    setPlan('');
  };

  const generatePlan=async()=>{
    setAiLoad(true);
    const games=ALL_GAMES.filter(g=>selected.includes(g.id)).map(g=>`"${g.title}": ${g.desc}`).join('\n');
    const r=await aiComplete(`Ты коуч по нейро-семантике. Пользователь выбрал 5 «игр великого любовника» для практики на этой неделе:\n${games}\n\nСоздай персональный план на неделю (7 дней). Для каждого дня: 1-2 конкретных действия. Тёплый, вдохновляющий тон. Формат: "Понедельник: ...", и т.д.`);
    setPlan(r);setAiLoad(false);
  };

  const completedCount=completedModules?.length||0;

  return(
    <Wrap>
      <Hero num={12} suit="♠" bg="linear-gradient(135deg,#100818,#28103A)" color="#9060D0"
        title="Со-Творение<br/>и Слияние Миров" sub="Финальный модуль. Два целостных человека создают третью реальность — общий мир, богатый смыслом и любовью."/>

      {completedCount>=11&&(
        <div style={{background:'linear-gradient(135deg,#2C1810,#3A1828)',borderRadius:16,padding:'24px 28px',marginBottom:24,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:8}}>🎉</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:'#F5EDE0',fontWeight:700,marginBottom:8}}>Вы прошли весь курс!</div>
          <div style={{fontSize:14,color:'#A09080',lineHeight:1.7}}>12 модулей · {completedCount} завершено · Вы — Великий Любовник</div>
        </div>
      )}

      <Card>
        <CardTitle>Взаимозависимость vs Зависимость</CardTitle>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:8}}>
          {[['😰 Зависимость','«Я не могу жить без тебя»','Из страха и пустоты','#C05A3A','#FFF4F0'],
            ['🌟 Взаимозависимость','«Я выбираю тебя»','Из силы и полноты','#2D5240','#F0F8F4'],
            ['😶 Независимость','«Мне никто не нужен»','Из защиты и страха','#8B6914','#FFF8EE']
          ].map(([t,q,d,c,bg])=>(
            <div key={t} style={{background:bg,borderRadius:12,padding:'14px 16px',border:`1px solid ${c}30`,textAlign:'center'}}>
              <div style={{fontSize:13,fontWeight:700,color:c,marginBottom:6}}>{t}</div>
              <div style={{fontSize:12,color:'#5A4438',marginBottom:4,fontStyle:'italic'}}>«{q}»</div>
              <div style={{fontSize:11,color:'#A08878'}}>{d}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <CardTitle>Выберите 5 игр для вашего плана</CardTitle>
        <Body>Какие игры вы хотите внедрить на этой неделе? Выберите ровно 5:</Body>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10,marginBottom:20}}>
          {ALL_GAMES.map(g=>{
            const isSelected=selected.includes(g.id);
            const mod=ALL_MODULES.find(m=>m.id===g.module);
            return(
              <div key={g.id} onClick={()=>toggle(g.id)} style={{
                padding:'14px 16px',borderRadius:12,cursor:'pointer',
                border:`2px solid ${isSelected?mod?.color||'#C8842A':'#EDE0D4'}`,
                background:isSelected?`${mod?.color||'#C8842A'}12`:'#FFFDF9',
                transition:'all .2s',
                opacity:!isSelected&&selected.length>=5?0.5:1,
              }}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:16,color:mod?.color||'#C8842A'}}>{mod?.suit}</span>
                  <span style={{fontSize:13,fontWeight:700,color:isSelected?mod?.color||'#C8842A':'#2C1810'}}>{g.title}</span>
                  {isSelected&&<span style={{marginLeft:'auto',color:mod?.color||'#C8842A',fontSize:16}}>✓</span>}
                </div>
                <div style={{fontSize:12,color:'#7A5C4A',lineHeight:1.5}}>{g.desc}</div>
              </div>
            );
          })}
        </div>

        <div style={{textAlign:'center',marginBottom:16}}>
          <span style={{fontSize:14,color:'#7A5C4A'}}>Выбрано: </span>
          <span style={{fontSize:16,fontWeight:700,color:'#4A2A6A'}}>{selected.length}/5</span>
        </div>

        {selected.length===5&&(
          <button onClick={generatePlan} disabled={aiLoad} style={{
            width:'100%',padding:14,borderRadius:12,border:'none',
            background:aiLoad?'#C0B8CC':'linear-gradient(135deg,#4A2A6A,#6A40A0)',
            color:'#fff',fontSize:15,fontWeight:600,cursor:aiLoad?'default':'pointer',marginBottom:16,
          }}>
            {aiLoad?'⏳ Создаю ваш план...':'✨ Создать персональный план Великого Любовника'}
          </button>
        )}

        {plan&&(
          <div className="fade-up" style={{background:'linear-gradient(135deg,#F8F0FF,#EEE4F8)',border:'2px solid #C0A8E0',borderRadius:16,padding:'24px 28px'}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:'#2C1810',fontWeight:700,marginBottom:16}}>
              💜 Ваш персональный план
            </div>
            <div style={{fontSize:14,color:'#3C2848',lineHeight:1.85,whiteSpace:'pre-wrap'}}>{plan}</div>
          </div>
        )}
      </Card>

      <Card>
        <CardTitle>Ключевые инсайты</CardTitle>
        <Insight icon="♠" text="Два целостных человека создают богатство. Двое неполных — взаимозависимость из страха."/>
        <Insight icon="💜" text="Swish: замените образ «слабого Я» на образ «ресурсного Я» — резко, быстро, с интенсивностью."/>
        <Insight icon="🌟" text="Ваш персональный план — это не список задач. Это выбор игр, которые вы хотите играть."/>
      </Card>

      <div style={{background:'linear-gradient(135deg,#2C1810,#1A0E20)',borderRadius:16,padding:'36px',textAlign:'center',marginTop:16}}>
        <div style={{fontSize:40,marginBottom:12}}>♠♥♦♣</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:'#F5EDE0',fontWeight:700,marginBottom:10}}>Вы — Великий Любовник</div>
        <div style={{fontSize:14,color:'#A09080',lineHeight:1.8,maxWidth:460,margin:'0 auto 20px'}}>
          Теперь у вас есть карта. Инструменты. Понимание. Остальное — ежедневная практика выбора игр, которые строят любовь.
        </div>
        <button onClick={()=>onComplete(12)} style={{padding:'14px 32px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#C05A3A,#C8842A)',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',boxShadow:'0 4px 20px rgba(200,132,42,.4)'}}>
          ✓ Завершить курс
        </button>
      </div>
    </Wrap>
  );
}
window.Module12=Module12;
</script>

<!-- ═══ APP SHELL ═══════════════════════════════ -->
<script type="text/babel">
function Sidebar({current,completed,onNavigate}){
  const pct=Math.round((completed.length/ALL_MODULES.length)*100);
  return(
    <div style={{width:272,minWidth:272,background:'#1E1209',display:'flex',flexDirection:'column',height:'100vh',position:'sticky',top:0,overflowY:'auto',flexShrink:0}}>
      <div style={{padding:'28px 22px 20px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
        <div style={{fontFamily:"'Playfair Display',serif",color:'#F0E6D3',fontSize:17,fontWeight:700,lineHeight:1.3,marginBottom:4}}>Игры Великих<br/>Любовников</div>
        <div style={{color:'#8A7060',fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase'}}>Курс-тренинг · 12 модулей</div>
      </div>
      <div style={{padding:'12px 22px 14px',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#8A7060',marginBottom:7,letterSpacing:'0.08em',textTransform:'uppercase'}}>
          <span>Прогресс</span><span style={{color:'#C8842A',fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{height:4,background:'rgba(255,255,255,.1)',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#C8842A,#C05A3A)',borderRadius:2,width:`${pct}%`,transition:'width .6s ease'}}/>
        </div>
      </div>
      <ul style={{flex:1,padding:'8px 10px',listStyle:'none',margin:0}}>
        {ALL_MODULES.map(mod=>{
          const isActive=mod.id===current;
          const isDone=completed.includes(mod.id);
          return(
            <li key={mod.id} onClick={()=>onNavigate(mod.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'9px 10px',borderRadius:10,cursor:'pointer',transition:'all .2s',marginBottom:1,
                background:isActive?'rgba(200,132,42,.18)':'transparent',opacity:isDone&&!isActive?.75:1}}>
              <div style={{width:30,height:30,borderRadius:8,background:isActive?mod.color:'rgba(255,255,255,.06)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,position:'relative'}}>
                <span style={{color:isActive?'#fff':mod.color}}>{mod.suit}</span>
                <span style={{position:'absolute',bottom:-1,right:-1,background:'#1E1209',borderRadius:3,fontSize:7,color:'#6A5A4A',padding:'0 2px',fontFamily:'monospace'}}>{mod.id}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500,color:isActive?'#F0E6D3':'#A09080',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{mod.title}</div>
                <div style={{fontSize:11,color:'#5A4A3A',marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{mod.sub}</div>
              </div>
              {isDone&&<span style={{color:'#C8842A',fontSize:12,flexShrink:0}}>✓</span>}
            </li>
          );
        })}
      </ul>
    </div>
  );
}

const MODULE_COMPONENTS={1:window.Module1,2:window.Module2,3:window.Module3,4:window.Module4,5:window.Module5,6:window.Module6,7:window.Module7,8:window.Module8,9:window.Module9,10:window.Module10,11:window.Module11,12:window.Module12};

function App(){
  const [current,setCurrent]=useState(()=>parseInt(localStorage.getItem('ggl_cur')||'1'));
  const [completed,setCompleted]=useState(()=>{try{return JSON.parse(localStorage.getItem('ggl_done')||'[]');}catch{return [];}});
  const [mobileSidebar,setMobileSidebar]=useState(false);

  useEffect(()=>{localStorage.setItem('ggl_cur',current);},[current]);
  useEffect(()=>{localStorage.setItem('ggl_done',JSON.stringify(completed));},[completed]);

  const handleComplete=(id)=>{
    setCompleted(p=>p.includes(id)?p:[...p,id]);
    if(id<12)setTimeout(()=>setCurrent(id+1),400);
  };
  const navigate=(id)=>{setCurrent(id);setMobileSidebar(false);};

  const ModComp=MODULE_COMPONENTS[current];

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:'#FAF6F0',minHeight:'100vh',display:'flex',color:'#2C1810'}}>
      <style>{`
        @media(max-width:768px){.mod-wrap{padding:24px 16px 60px!important;}}
        input,textarea,button{font-family:'DM Sans',sans-serif;}
      `}</style>

      {/* Mobile header */}
      <div className="mobile-bar" style={{display:'none',position:'fixed',top:0,left:0,right:0,background:'#1E1209',padding:'12px 16px',alignItems:'center',gap:12,zIndex:100,height:56}}>
        <button onClick={()=>setMobileSidebar(v=>!v)} style={{background:'none',border:'none',color:'#F0E6D3',fontSize:20,cursor:'pointer',padding:4}}>☰</button>
        <span style={{fontFamily:"'Playfair Display',serif",color:'#F0E6D3',fontSize:14}}>Игры Великих Любовников</span>
      </div>

      {/* Mobile overlay */}
      {mobileSidebar&&<div onClick={()=>setMobileSidebar(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:99}}/>}

      {/* Sidebar desktop */}
      <div className="sidebar-wrap" style={{display:'flex'}}>
        <Sidebar current={current} completed={completed} onNavigate={navigate}/>
      </div>

      {/* Sidebar mobile */}
      {mobileSidebar&&(
        <div style={{position:'fixed',top:0,left:0,bottom:0,zIndex:200}}>
          <Sidebar current={current} completed={completed} onNavigate={navigate}/>
        </div>
      )}

      {/* Main */}
      <div style={{flex:1,overflowY:'auto',minHeight:'100vh'}}>
        {ModComp
          ?<ModComp moduleId={current} onComplete={handleComplete} onNavigate={navigate} completedModules={completed}/>
          :<div style={{padding:40,textAlign:'center',color:'#A08878'}}>Модуль не найден</div>
        }
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
